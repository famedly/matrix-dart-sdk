name: Publish to pub.dev

on:
  workflow_call:

jobs:
  # Inlined from famedly/frontend-ci-templates publish-pub.yml so we can pass
  # `--no-example`: pub auto-resolves the Flutter `example/` package, which has
  # no Flutter SDK on the publish runner and would fail `dart pub get`.
  publish:
    environment: "pub.dev"
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Read env file
        run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: dart-lang/setup-dart@a57a6c04cf7d4840e88432aad6281d1e125f0d46
        with:
          sdk: ${{ env.dart_version || 'stable' }}
      - name: Install dependencies
        run: dart pub get --no-example
      - name: Publish - dry run
        run: dart pub publish --dry-run
      - name: Publish to pub.dev
        run: dart pub publish -f

  create_gh_release:
    env:
      GH_TOKEN: ${{ github.token }}
    needs: [publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        run: |
          TAG_NAME=${{ github.ref_name }}
          version=$(echo $TAG_NAME | sed 's/^v//')
          releaseRegex="^v[0-9]+\.[0-9]+\.[0-9]+$"
          releaseCandidateRegex="^v[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+$"
          notes=$(./scripts/extract_changelog.sh $version)
          if [ -n "$notes" ]; then
            if [[ $TAG_NAME =~ $releaseRegex ]]; then
              gh release create $TAG_NAME --notes "$notes" -t $TAG_NAME --verify-tag
            elif [[ $TAG_NAME =~ $releaseCandidateRegex ]]; then
              gh release create $TAG_NAME --notes "$notes" --prerelease -t $TAG_NAME --verify-tag
            fi
          else
            if [[ $TAG_NAME =~ $releaseRegex ]]; then
              gh release create $TAG_NAME --generate-notes -t $TAG_NAME --verify-tag
            elif [[ $TAG_NAME =~ $releaseCandidateRegex ]]; then
              gh release create $TAG_NAME --generate-notes --prerelease -t $TAG_NAME --verify-tag
            fi
          fi
