# This file is automatically generated from Nix configuration. Do not edit directly.

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
      - name: Check formatting
        run: dart format lib/ --set-exit-if-changed
        shell: nix develop .#dart --command bash {0}
      - name: Fetch dependencies
        run: dart pub get --no-example
        shell: nix develop .#dart --command bash {0}
      - name: Run analyzer
        run: dart analyze
        shell: nix develop .#dart --command bash {0}
      - name: Run dart_code_linter
        run: |
          if grep -q 'dart_code_linter:' pubspec.yaml; then
            dart run dart_code_linter:metrics analyze lib
          fi
        shell: nix develop .#dart --command bash {0}
name: Dart CI
"on":
  merge_group: {}
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
